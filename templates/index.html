<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing URL Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <i class="fa-solid fa-shield-halved fa-3x shield-icon"></i>
            </div>
            <h1>PHISHING URL DETECTOR</h1>
            <p>Check a URL and find out if it is Safe or Suspicious</p>
        </header>

        <main>
            <div class="input-section">
                <form id="urlForm">
                    <div class="input-group">
                        <input type="text" id="urlInput" placeholder="Enter URL here (e.g., https://example.com)..." required>
                        <button type="submit" id="checkBtn">CHECK</button>
                    </div>
                </form>
            </div>

            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Analyzing...</p>
            </div>

            <div id="resultSection" class="result-card hidden">
                <h3>Result</h3>
                <div id="resultStatus" class="status"></div>
                <p id="resultMessage" class="message"></p>
                <ul id="reasonsList" class="reasons"></ul>
            </div>
            
            <div class="history-section">
                <h3>Recent Checks</h3>
                <ul id="historyList">
                    <!-- History items will be populated here -->
                </ul>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
